services:

  # ── PHP-FPM (Laravel) ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warialau_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=production
    depends_on:
      - redis
    networks:
      - warialau_net

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: warialau_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - warialau_net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: warialau_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - warialau_net

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  warialau_net:
    driver: bridge
