; ── Upload limits (untuk file APK besar) ──────────────────────────────────
upload_max_filesize = 150M
post_max_size       = 150M

; ── Execution ──────────────────────────────────────────────────────────────
max_execution_time  = 300
max_input_time      = 300
memory_limit        = 256M

; ── Error reporting (production) ───────────────────────────────────────────
display_errors = Off
log_errors     = On
error_log      = /var/log/php_errors.log

; ── Timezone ───────────────────────────────────────────────────────────────
date.timezone = Asia/Makassar
